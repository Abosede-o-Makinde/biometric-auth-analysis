name: Feature request
description: Suggest an enhancement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you considered.

  - type: checkboxes
    id: scope
    attributes:
      label: Area
      options:
        - label: Engine (metrics, bias, attack, GDPR)
        - label: CLI / Streamlit dashboard
        - label: Reporters (JSON, PDF, console)
        - label: Documentation / notebooks
        - label: Tests / CI
